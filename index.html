<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORTILLA AND BURGER | منيو تورتيلا بحرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffc107; --secondary: #1a1a1a; --text: #333; --discount: #e74c3c; }
        body { background: #fdfdfd; color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 250px; }
        
        /* بنرات العروض الذكية */
        .banner { color: white; text-align: center; padding: 10px; font-weight: 900; display: none; font-size: 0.8rem; position: sticky; top: 0; z-index: 2000; }
        #slow-day { background: var(--secondary); border-bottom: 3px solid var(--primary); }
        #happy-hour { background: var(--discount); }

        header { background: var(--secondary); color: white; padding: 30px 15px; text-align: center; border-radius: 0 0 30px 30px; }
        .logo-text { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px; }
        .logo-text span { color: var(--primary); }

        .order-type { display: flex; gap: 10px; padding: 20px; }
        .t-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #eee; background: white; font-weight: bold; cursor: pointer; }
        .t-btn.active { border-color: var(--primary); background: #fffdf5; }

        .cat-title { background: #eee; padding: 12px 20px; font-weight: 900; margin: 20px 0 10px; border-right: 6px solid var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px; }
        .card { background: white; border-radius: 20px; border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card img { width: 100%; height: 110px; object-fit: cover; }
        .details { padding: 10px; text-align: center; flex-grow: 1; }
        .details h3 { font-size: 0.85rem; margin: 5px 0; min-height: 40px; }
        .price { color: #d35400; font-weight: 900; font-size: 1rem; }
        
        .customize { padding: 5px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .opt { font-size: 0.65rem; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fafafa; }
        .opt.selected { background: var(--primary); border-color: var(--primary); font-weight: bold; }

        .add-btn { background: var(--secondary); color: white; border: none; padding: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .add-btn:active { background: var(--primary); color: var(--secondary); }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 15px; box-sizing: border-box; z-index: 1000; }
        .cart-info { font-size: 0.75rem; color: #666; margin-bottom: 8px; display: none; }
        .main-order-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--secondary); color: white; font-size: 1.1rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="slow-day" class="banner">✨ عروض بداية الأسبوع مفعّلة الآن! ✨</div>
<div id="happy-hour" class="banner">🕒 مفعّل الآن: عرض الساعة السعيدة 🕒</div>

<header>
    <div class="logo-text">TORTILLA <span>& BURGER</span></div>
    <div style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;">قائمة الأطعمة | فرع بحرة</div>
</header>

<div class="order-type">
    <button id="deliv" class="t-btn" onclick="setT('توصيل للمنزل 🏠')">توصيل 🚚</button>
    <button id="pick" class="t-btn active" onclick="setT('استلام من الفرع 🏃‍♂️')">استلام 🥡</button>
</div>

<div id="menu-cont"></div>

<div class="footer">
    <div id="cart-msg" class="cart-info"></div>
    <button class="main-order-btn" onclick="sendToWA()">إرسال الطلب عبر الواتساب | <span id="total">0</span> ريال</button>
</div>

<script>
let oType = "استلام من الفرع 🏃‍♂️";
let cart = [];
let disc = false;

// ذكاء الوقت
const d = new Date();
const day = d.getDay(); 
const hr = d.getHours();
if(day === 0 || day === 1) { disc = true; document.getElementById('slow-day').style.display='block'; }
if(hr >= 16 && hr < 19) { disc = true; document.getElementById('happy-hour').style.display='block'; }

// بيانات المنيو كاملة من الصورة
const menu = [
    { cat: "برجر BURGER", items: [
        { n: "برجر دجاج عادي", p: 8, dp: 7, img: "https://images.unsplash.com/photo-1510693223437-12499d3910f1?w=200" },
        { n: "برجر دجاج دبل", p: 14, dp: 12, img: "https://images.unsplash.com/photo-1510693223437-12499d3910f1?w=250" },
        { n: "برجر لحم عادي", p: 8, dp: 7, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
        { n: "برجر لحم دبل", p: 14, dp: 12, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=250" },
        { n: "وجبة برجر لحم/دجاج (صغير)", p: 12, dp: 10, img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200" },
        { n: "وجبة برجر لحم/دجاج (كبير)", p: 17, dp: 15, img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=250" }
    ]},
    { cat: "تورتيلا TORTILLA", items: [
        { n: "تورتيلا أبيض صغير", p: 6, dp: 5, img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=200" },
        { n: "تورتيلا أبيض كبير", p: 8, dp: 7, img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=250" },
        { n: "تورتيلا أحمر صغير", p: 7, dp: 6, img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=200" },
        { n: "تورتيلا أحمر كبير", p: 10, dp: 9, img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=250" }
    ]},
    { cat: "تورتيلا عربي MEALS", items: [
        { n: "تورتيلا عربي أبيض", p: 18, dp: 16, img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=200" },
        { n: "تورتيلا عربي أحمر", p: 21, dp: 19, img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=250" }
    ]},
    { cat: "باشكا BASHKA", items: [
        { n: "جامبو دجاج بالموزاريلا", p: 8, dp: 7, img: "https://images.unsplash.com/photo-1539252554452-4411ba092fc5?w=200" },
        { n: "باشكا دجاج", p: 15, dp: 13, img: "https://images.unsplash.com/photo-1539252554452-4411ba092fc5?w=250" }
    ]},
    { cat: "بطاطس FRIES", items: [
        { n: "بطاطس بالجبن والصوص", p: 5, dp: 4, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200" },
        { n: "بطاطس وسط بالجبن والصوص", p: 7, dp: 6, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=250" },
        { n: "بطاطس كبير بالجبن والصوص", p: 12, dp: 10, img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?w=200" },
        { n: "بطاطس دجاج وجبن (صغير)", p: 13, dp: 11, img: "https://images.unsplash.com/photo-1562608107-285600021644?w=200" },
        { n: "بطاطس دجاج وجبن (كبير)", p: 20, dp: 18, img: "https://images.unsplash.com/photo-1562608107-285600021644?w=250" }
    ]},
    { cat: "مشروبات DRINKS", items: [
        { n: "مشروب غازي", p: 2.5, dp: 2.5, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=200" },
        { n: "عصير", p: 2, dp: 2, img: "https://images.unsplash.com/photo-1613478223719-2ab80260f423?w=200" },
        { n: "ماء", p: 1, dp: 1, img: "https://images.unsplash.com/photo-1548839140-29a74ea07ad5?w=200" },
        { n: "ماء صغير", p: 0.5, dp: 0.5, img: "https://images.unsplash.com/photo-1548839140-29a74ea07ad5?w=100" }
    ]}
];

const opts = ["بدون مخلل", "بدون شطة", "سبايسي", "زيادة ثوم"];

function setT(t) {
    oType = t;
    document.getElementById('deliv').classList.toggle('active', t.includes('توصيل'));
    document.getElementById('pick').classList.toggle('active', t.includes('استلام'));
}

const container = document.getElementById('menu-cont');
menu.forEach((c, cI) => {
    let h = `<div class="cat-title">${c.cat}</div><div class="grid">`;
    c.items.forEach((it, iI) => {
        const pr = disc ? it.dp : it.p;
        h += `<div class="card">
            <img src="${it.img}">
            <div class="details">
                <h3>${it.n}</h3>
                <span class="price">${pr} ريال</span>
            </div>
            ${c.cat !== 'مشروبات DRINKS' ? `<div class="customize" id="opt-${cI}-${iI}">
                ${opts.map(o => `<div class="opt" onclick="this.classList.toggle('selected')">${o}</div>`).join('')}
            </div>` : ''}
            <button class="add-btn" onclick="add('${it.n}', ${pr}, 'opt-${cI}-${iI}')">أضف للطلب +</button>
        </div>`;
    });
    h += `</div>`;
    container.innerHTML += h;
});

function add(n, p, id) {
    let sOpts = [];
    let el = document.getElementById(id);
    if(el) {
        el.querySelectorAll('.opt.selected').forEach(o => sOpts.push(o.innerText));
        el.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    }
    cart.push({ n, p, o: sOpts });
    render();
}

function render() {
    let tot = cart.reduce((s, i) => s + i.p, 0);
    document.getElementById('total').innerText = tot;
    let msg = document.getElementById('cart-msg');
    if(cart.length > 0) {
        msg.style.display = "block";
        msg.innerText = "السلة: " + cart.map(i => i.n).join(", ");
    }
}

function sendToWA() {
    if(cart.length === 0) return alert("اختر وجباتك أولاً!");
    let tot = cart.reduce((s, i) => s + i.p, 0);
    let txt = `*طلب جديد من منيو تورتيلا وبحرة*%0a`;
    txt += `*النوع:* ${oType}%0a%0a`;
    cart.forEach((i, idx) => {
        txt += `${idx+1}. ${i.n} (${i.p} ر.س)%0a`;
        if(i.o.length > 0) txt += `   - الملاحظات: ${i.o.join(', ')}%0a`;
    });
    txt += `%0a*الإجمالي: ${tot} ريال*%0a`;
    if(oType.includes('توصيل')) txt += `%0a_يرجى إرسال اللوكيشن_ 📍`;
    
    window.open(`https://wa.me/966567561985?text=${txt}`);
}
</script>
</body>
</html>
