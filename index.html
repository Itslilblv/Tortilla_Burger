<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORTILLA SMART MENU | منيو تورتيلا الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6600; --secondary: #222; --bg: #fff; --discount: #e74c3c; }
        body { background: var(--bg); color: var(--secondary); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 250px; }
        
        .promo-banner { color: white; text-align: center; padding: 10px; font-weight: 900; display: none; font-size: 0.9rem; position: sticky; top: 0; z-index: 2000; }
        #happy-hour-banner { background: var(--discount); }
        #slow-day-banner { background: var(--secondary); border-bottom: 2px solid var(--primary); }

        header { text-align: center; padding: 25px 10px; background: #fff; border-bottom: 1px solid #eee; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--secondary); margin: 0; }
        .logo span { color: var(--primary); }

        .order-type-container { display: flex; gap: 10px; padding: 15px; background: #f9f9f9; }
        .type-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; text-align: center; transition: 0.3s; }
        .type-btn.active { border-color: var(--primary); color: var(--primary); background: #fff5ee; }

        .section-title { background: #f4f4f4; padding: 12px 20px; font-weight: 900; border-right: 6px solid var(--primary); margin: 20px 0 10px 0; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px; }
        .card { border: 1px solid #eee; border-radius: 18px; overflow: hidden; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .info { padding: 12px; text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.9rem; margin: 5px 0; height: 40px; overflow: hidden; color: #444; }
        .price-container { margin-top: 5px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 0.8rem; display: none; margin-left: 5px; }
        .price { color: var(--primary); font-weight: 900; font-size: 1.1rem; }
        .add-btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); background: var(--secondary); }

        #feedback-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 85%; }
        .emoji-btn { font-size: 3rem; cursor: pointer; margin: 0 10px; display: inline-block; transition: 0.3s; }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; background: #fff; border-top: 1px solid #eee; z-index: 1001; box-sizing: border-box; }
        .order-btn { background: var(--secondary); color: #fff; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<div id="slow-day-banner" class="promo-banner">✨ عروض بداية الأسبوع مفعّلة الآن (خصم خاص) ✨</div>
<div id="happy-hour-banner" class="promo-banner">🕒 مفعّل الآن: عرض الساعة السعيدة (خصم إضافي) 🕒</div>

<header>
    <div class="logo">TORT<span>ILLA</span></div>
    <div style="font-size: 0.85rem; color: #777; margin-top: 5px;">فرع بحرة | أطعم تورتيلا وبرجر بالمنطقة</div>
</header>

<div class="order-type-container">
    <div id="btn-delivery" class="type-btn" onclick="setType('توصيل للمنزل 🏠')">توصيل 🚚</div>
    <div id="btn-pickup" class="type-btn active" onclick="setType('استلام من الفرع 🏃‍♂️')">استلام 🥡</div>
</div>

<div id="menu-container"></div>

<div class="footer">
    <button class="order-btn" onclick="processOrder()">إرسال الطلب | <span id="total-price">0</span> ريال</button>
</div>

<div id="feedback-modal">
    <div class="modal-content">
        <h3>كيف كانت تجربتك؟</h3>
        <div style="margin: 20px 0;">
            <span class="emoji-btn" onclick="finish('😍')">😍</span>
            <span class="emoji-btn" onclick="finish('🙂')">🙂</span>
            <span class="emoji-btn" onclick="finish('☹️')">☹️</span>
        </div>
        <p style="font-size: 0.8rem; color: #888;">تقييمك يساعدنا على التطوير</p>
    </div>
</div>

<script>
let orderType = "استلام من الفرع 🏃‍♂️";
let cart = [];
let isDiscount = false;

// ذكاء الوقت واليوم
const now = new Date();
const day = now.getDay(); 
const hour = now.getHours();

if (day === 0 || day === 1) { // الأحد والإثنين
    isDiscount = true;
    document.getElementById('slow-day-banner').style.display = 'block';
}
if (hour >= 16 && hour < 19) { // من 4 عصرًا لـ 7 مساءً
    isDiscount = true;
    document.getElementById('happy-hour-banner').style.display = 'block';
}

const menuData = [
    { cat: "وجبات التورتيلا الشهيرة", items: [
        { n: "وجبة تورتيلا دجاج", p: 24, dp: 20, img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=300" },
        { n: "وجبة تورتيلا لحم", p: 27, dp: 23, img: "https://images.unsplash.com/photo-1552332386-f8dd00dc2f85?w=300" },
        { n: "تورتيلا دجاج سبيشل (حراق)", p: 25, dp: 21, img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=300" }
    ]},
    { cat: "قسم البرجر والزنجر", items: [
        { n: "وجبة برجر زنجر سوبر", p: 23, dp: 19, img: "https://images.unsplash.com/photo-1510693223437-12499d3910f1?w=300" },
        { n: "وجبة برجر لحم كلاسيك", p: 25, dp: 21, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" },
        { n: "برجر دجاج مقرمش (ساندوتش)", p: 16, dp: 13, img: "https://images.unsplash.com/photo-1610440042657-612c34d95e9f?w=300" }
    ]},
    { cat: "الأصناف الجانبية (الأكثر طلباً)", items: [
        { n: "بطاطس تورتيلا بالجبنة", p: 14, dp: 10, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
        { n: "ديناميت تشيكن (بوكس)", p: 20, dp: 16, img: "https://images.unsplash.com/photo-1562608107-285600021644?w=300" },
        { n: "حلقات بصل (8 قطع)", p: 10, dp: 8, img: "https://images.unsplash.com/photo-1639146175535-99f3630fc552?w=300" },
        { n: "صوص تورتيلا الخاص", p: 3, dp: 2, img: "https://images.unsplash.com/photo-1470124113129-c2ae476722ec?w=300" }
    ]}
];

function setType(type) {
    orderType = type;
    document.getElementById('btn-delivery').classList.toggle('active', type.includes('توصيل'));
    document.getElementById('btn-pickup').classList.toggle('active', type.includes('استلام'));
}

const cont = document.getElementById('menu-container');
menuData.forEach(s => {
    let html = `<div class="section-title">${s.cat}</div><div class="grid">`;
    s.items.forEach(item => {
        const fPrice = isDiscount ? item.dp : item.p;
        html += `<div class="card">
            <img src="${item.img}">
            <div class="info">
                <h3>${item.n}</h3>
                <div class="price-container">
                    <span class="old-price" style="${isDiscount ? 'display:inline' : ''}">${item.p} ريال</span>
                    <span class="price">${fPrice} ريال</span>
                </div>
            </div>
            <button class="add-btn" onclick="add('${item.n}', ${fPrice})">أضف +</button>
        </div>`;
    });
    html += `</div>`;
    cont.innerHTML += html;
});

function add(n, p) { cart.push({ n, p }); render(); }
function render() {
    let total = cart.reduce((s, i) => s + i.p, 0);
    document.getElementById('total-price').innerText = total;
}

function processOrder() {
    if(cart.length === 0) return alert("السلة فارغة!");
    document.getElementById('feedback-modal').style.display = 'flex';
}

function finish(rating) {
    let total = cart.reduce((s, i) => s + i.p, 0);
    let msg = `*طلب جديد (تورتيلا بحرة)*%0a`;
    msg += `*نوع الطلب:* ${orderType}%0a`;
    msg += `*التقييم:* ${rating}%0a%0a`;
    cart.forEach((i, idx) => msg += `${idx+1}. ${i.n} (${i.p} ريال)%0a`);
    msg += `%0a*الإجمالي: ${total} ريال*%0a`;
    if(orderType.includes('توصيل')) msg += `%0a_يرجى إرسال اللوكيشن_ 📍`;
    
    window.open(`https://wa.me/966533351332?text=${msg}`);
    document.getElementById('feedback-modal').style.display = 'none';
}
</script>
</body>
</html>
