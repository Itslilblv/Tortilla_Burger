<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORTILLA SMART SYSTEM | نظام تورتيلا المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6600; --secondary: #222; --bg: #fff; --discount: #e74c3c; }
        body { background: #f8f8f8; color: var(--secondary); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 280px; }
        
        .promo-banner { color: white; text-align: center; padding: 10px; font-weight: 900; display: none; font-size: 0.8rem; position: sticky; top: 0; z-index: 2000; }
        #slow-day-banner { background: var(--secondary); border-bottom: 2px solid var(--primary); }
        #happy-hour-banner { background: var(--discount); }

        header { text-align: center; padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--secondary); margin: 0; }
        .logo span { color: var(--primary); }

        .order-type-container { display: flex; gap: 10px; padding: 15px; background: #fff; margin-bottom: 10px; }
        .type-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; text-align: center; }
        .type-btn.active { border-color: var(--primary); color: var(--primary); background: #fff5ee; }

        .section-title { background: var(--secondary); color: #fff; padding: 10px 20px; font-weight: 700; margin: 20px 0 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; }
        .card { border-radius: 15px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 110px; object-fit: cover; }
        .info { padding: 10px; text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.85rem; margin: 5px 0; height: 35px; overflow: hidden; }
        .price { color: var(--primary); font-weight: 900; font-size: 1rem; }
        .old-price { text-decoration: line-through; color: #999; font-size: 0.75rem; display: none; margin-left: 5px; }

        /* خيارات التخصيص */
        .custom-options { padding: 5px 10px 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .opt-btn { font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; }
        .opt-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

        .add-btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #fff; border-top: 1px solid #eee; z-index: 1001; box-sizing: border-box; }
        .cart-preview { background: #fff5ee; border: 1px solid var(--primary); border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 0.8rem; display: none; max-height: 80px; overflow-y: auto; }
        .order-btn { background: var(--secondary); color: #fff; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="slow-day-banner" class="promo-banner">✨ عروض بداية الأسبوع (الأحد والإثنين) مفعّلة الآن ✨</div>
<div id="happy-hour-banner" class="promo-banner">🕒 مفعّل الآن: عرض الساعة السعيدة (4م - 7م) 🕒</div>

<header>
    <div class="logo">TORT<span>ILLA</span></div>
    <div style="font-size: 0.8rem; color: #666;">فرع بحرة | مخصص لخدمتكم 🌯</div>
</header>

<div class="order-type-container">
    <div id="btn-delivery" class="type-btn" onclick="setType('توصيل للمنزل 🏠')">توصيل 🚚</div>
    <div id="btn-pickup" class="type-btn active" onclick="setType('استلام من الفرع 🏃‍♂️')">استلام 🥡</div>
</div>

<div id="menu-container"></div>

<div class="footer">
    <div id="cart-preview" class="cart-preview"></div>
    <button class="order-btn" onclick="sendOrder()">تأكيد الطلب | <span id="total-price">0</span> ريال</button>
</div>

<script>
let orderType = "استلام من الفرع 🏃‍♂️";
let cart = [];
let isDiscount = false;

const now = new Date();
const day = now.getDay(); 
const hour = now.getHours();
if (day === 0 || day === 1) { isDiscount = true; document.getElementById('slow-day-banner').style.display = 'block'; }
if (hour >= 16 && hour < 19) { isDiscount = true; document.getElementById('happy-hour-banner').style.display = 'block'; }

// المنيو الكامل مع خيارات التخصيص
const menuData = [
    { cat: "وجبات التورتيلا", items: [
        { n: "وجبة تورتيلا دجاج", p: 24, dp: 20, opts: ["بدون مخلل", "بدون شطة", "سبايسي حراق", "إضافة ثوم"], img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=200" },
        { n: "وجبة تورتيلا لحم", p: 27, dp: 23, opts: ["بدون مخلل", "بدون بصل", "طحينة زيادة"], img: "https://images.unsplash.com/photo-1552332386-f8dd00dc2f85?w=200" },
        { n: "تورتيلا رويال دبل", p: 32, dp: 28, opts: ["بدون مخلل", "سبايسي", "جبنة زيادة"], img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=200" }
    ]},
    { cat: "قسم البرجر والزنجر", items: [
        { n: "وجبة برجر زنجر", p: 23, dp: 19, opts: ["بدون مخلل", "بدون خس", "سبايسي"], img: "https://images.unsplash.com/photo-1510693223437-12499d3910f1?w=200" },
        { n: "وجبة برجر لحم مشوي", p: 25, dp: 21, opts: ["بدون بصل", "بدون مخلل", "بدون طماطم"], img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
        { n: "وجبة تشيكن فيليه", p: 22, dp: 18, opts: ["مايونيز زيادة", "بدون خس"], img: "https://images.unsplash.com/photo-1610440042657-612c34d95e9f?w=200" }
    ]},
    { cat: "الصحون والمقبلات", items: [
        { n: "صحن تورتيلا عربي", p: 28, dp: 24, opts: ["ثوم زيادة", "شطة جانبية"], img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=200" },
        { n: "ديناميت دجاج بوكس", p: 20, dp: 16, opts: ["صوص زيادة", "بدون صوص"], img: "https://images.unsplash.com/photo-1562608107-285600021644?w=200" },
        { n: "بطاطس بالجبنة", p: 14, dp: 11, opts: ["هلابينو زيادة", "بدون هلابينو"], img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200" },
        { n: "حلقات بصل", p: 10, dp: 8, opts: ["صوص باربيكيو"], img: "https://images.unsplash.com/photo-1639146175535-99f3630fc552?w=200" }
    ]}
];

function setType(type) {
    orderType = type;
    document.getElementById('btn-delivery').classList.toggle('active', type.includes('توصيل'));
    document.getElementById('btn-pickup').classList.toggle('active', type.includes('استلام'));
}

const cont = document.getElementById('menu-container');
menuData.forEach((s, sIdx) => {
    let html = `<div class="section-title">${s.cat}</div><div class="grid">`;
    s.items.forEach((item, iIdx) => {
        const fPrice = isDiscount ? item.dp : item.p;
        html += `<div class="card">
            <img src="${item.img}">
            <div class="info">
                <h3>${item.n}</h3>
                <span class="old-price" style="${isDiscount ? 'display:inline' : ''}">${item.p} ريال</span>
                <span class="price">${fPrice} ريال</span>
            </div>
            <div class="custom-options" id="opts-${sIdx}-${iIdx}">
                ${item.opts.map(o => `<div class="opt-btn" onclick="this.classList.toggle('selected')">${o}</div>`).join('')}
            </div>
            <button class="add-btn" onclick="addToCart('${item.n}', ${fPrice}, 'opts-${sIdx}-${iIdx}')">أضف +</button>
        </div>`;
    });
    html += `</div>`;
    cont.innerHTML += html;
});

function addToCart(name, price, optsId) {
    let selectedOpts = [];
    document.querySelectorAll(`#${optsId} .opt-btn.selected`).forEach(el => {
        selectedOpts.push(el.innerText);
        el.classList.remove('selected'); // إعادة تصفير الاختيارات بعد الإضافة
    });
    cart.push({ name, price, opts: selectedOpts });
    renderCart();
}

function renderCart() {
    let total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('total-price').innerText = total;
    let preview = document.getElementById('cart-preview');
    if(cart.length > 0) {
        preview.style.display = "block";
        preview.innerHTML = "<b>سلة الطلبات:</b> " + cart.map(i => `${i.name} ${i.opts.length ? '('+i.opts.join(', ')+')' : ''}`).join(" | ");
    }
}

function sendOrder() {
    if(cart.length === 0) return alert("السلة فارغة!");
    let total = cart.reduce((s, i) => s + i.price, 0);
    let msg = `*طلب جديد (تورتيلا بحرة)*%0a`;
    msg += `*النوع:* ${orderType}%0a%0a`;
    cart.forEach((i, idx) => {
        msg += `${idx+1}. ${i.name} (${i.price}ر.س)%0a`;
        if(i.opts.length > 0) msg += `   - ملاحظات: ${i.opts.join(', ')}%0a`;
    });
    msg += `%0a*الإجمالي: ${total} ريال*%0a`;
    if(orderType.includes('توصيل')) msg += `%0a_يرجى إرسال اللوكيشن_ 📍`;
    
    window.open(`https://wa.me/966567561985?text=${msg}`);
}
</script>
</body>
</html>
